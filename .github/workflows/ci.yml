name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: Labo5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Creer fichier .env
        run: |
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
          echo "REDIS_DB=${{ secrets.REDIS_DB }}" >> .env

      - name: Démarrer les services
        run: |
          docker network create labo05-network || true
          docker compose up -d mysql redis

      - name: Attendre que MySQL et Redis soient prêts
        run: |
          until docker compose exec -T mysql mysqladmin ping -h localhost -u root -proot --silent; do
            sleep 2
          done
          until docker compose exec -T mysql mysql -u root -proot -e "SELECT 1" &>/dev/null; do
            sleep 2
          done
          until docker compose exec -T redis redis-cli ping | grep -q PONG; do
            sleep 2
          done

      - name: Run tests
        working-directory: src
        run: python -m pytest

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout dépot
        uses: actions/checkout@v4

      - name: Build des conteneurs
        run: docker compose build

  deploy:
    runs-on: self-hosted
    needs: build
    environment: Labo5
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Nettoyer les fichiers cache Python
        run: sudo find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Checkout dépot
        uses: actions/checkout@v4

      - name: Créer fichier .env
        run: |
          echo "DB_HOST=${{ vars.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "REDIS_HOST=${{ vars.REDIS_HOST }}" >> .env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
          echo "REDIS_DB=${{ secrets.REDIS_DB }}" >> .env

      - name: Créer le réseau Docker
        run: docker network create labo05-network || true

      - name: Démarrer les conteneurs
        run: docker compose up -d --build